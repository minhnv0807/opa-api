services:
  opa-api:
    image: ${OPA_API_IMAGE:-opa-ai-labs/opa-api:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: opa-api
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${OPA_API_CONFIG_PATH:-./config.yaml}:/opa-api/config.yaml
      - ${OPA_API_AUTH_PATH:-./auths}:/root/.opa-api
      - ${OPA_API_LOG_PATH:-./logs}:/opa-api/logs
    restart: unless-stopped
